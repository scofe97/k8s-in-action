apiVersion: v1
kind: Pod
metadata:
  name: kiada-ssl
spec:
  # ── 공유 볼륨: initContainer 가 만든 인증서·config 를 envoy 가 읽는다 ──
  # emptyDir 은 Pod 안 컨테이너끼리 파일을 나눠 갖는 통로다(05-01). Pod 가 지워지면 사라진다.
  volumes:
    - name: work
      emptyDir: {}
  # ── init: 자체서명 TLS 인증서 + Envoy config 를 /work 에 생성 ──
  # ConfigMap(08-02) 을 안 쓰고 initContainer(05-03 §3)만으로 설정을 넣는다.
  initContainers:
    - name: setup                         # 일회성 준비 컨테이너 — 끝나면 죽는다
      image: alpine/openssl               # openssl 포함 경량 이미지
      command:
        - sh
        - -c
        - |
          # 1) example.com 용 자체서명 인증서 (localhost 로 접근하므로 -k 로 검증 생략할 것)
          openssl req -x509 -newkey rsa:2048 -nodes \
            -keyout /work/tls.key -out /work/tls.crt \
            -days 365 -subj "/CN=example.com"
          # 2) Envoy config 를 파일로 생성 (8443 TLS 종료 → 127.0.0.1:8080 평문 중계, admin 9901)
          cat > /work/envoy.yaml <<'EOF'
          admin:
            address:
              socket_address: { address: 0.0.0.0, port_value: 9901 }
          static_resources:
            listeners:
            - name: https_listener
              address:
                socket_address: { address: 0.0.0.0, port_value: 8443 }
              filter_chains:
              - filters:
                - name: envoy.filters.network.http_connection_manager
                  typed_config:
                    "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                    stat_prefix: ingress_https
                    route_config:
                      name: local_route
                      virtual_hosts:
                      - name: kiada
                        domains: ["*"]
                        routes:
                        - match: { prefix: "/" }
                          route: { cluster: kiada_http }
                    http_filters:
                    - name: envoy.filters.http.router
                      typed_config:
                        "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
                transport_socket:
                  name: envoy.transport_sockets.tls
                  typed_config:
                    "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.DownstreamTlsContext
                    common_tls_context:
                      tls_certificates:
                      - certificate_chain: { filename: "/work/tls.crt" }
                        private_key: { filename: "/work/tls.key" }
            clusters:
            - name: kiada_http
              connect_timeout: 0.25s
              type: STATIC
              lb_policy: ROUND_ROBIN
              load_assignment:
                cluster_name: kiada_http
                endpoints:
                - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address: { address: 127.0.0.1, port_value: 8080 }
          EOF
      volumeMounts:
        - { name: work, mountPath: /work }
  # ── 주 컨테이너 2개: Node.js 앱 + Envoy 사이드카 (병렬 기동) ──
  containers:
    - name: kiada                         # Node.js 서버 — HTTP 직접 처리
      image: luksa/kiada:0.2
      ports:
        - { name: http, containerPort: 8080 }
    - name: envoy                         # Envoy 리버스 프록시(멀티아키 공식 이미지 — ARM 네이티브)
      image: envoyproxy/envoy:v1.31-latest
      # 이미지 ENTRYPOINT 가 /docker-entrypoint.sh 라, args 만 주면 envoy 가 실행 안 됨.
      # command 로 entrypoint 를 우회해 envoy 를 직접 호출한다.
      command: ["envoy", "-c", "/work/envoy.yaml"]
      ports:
        - { name: https, containerPort: 8443 }   # HTTPS (Envoy 가 TLS 종료)
        - { name: admin, containerPort: 9901 }   # Envoy 관리 인터페이스
      volumeMounts:
        - { name: work, mountPath: /work, readOnly: true }
