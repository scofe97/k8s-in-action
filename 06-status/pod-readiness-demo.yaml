apiVersion: v1
kind: Pod
metadata:
  name: readiness-demo
spec:
  # ── Ready condition ↔ READY n/n 관계를 관찰하는 실습 ──
  # 컨테이너 2개 중 하나는 readiness probe 를 통과하고, 하나는 일부러 실패시킨다.
  # → 컨테이너 하나가 not-ready 면 Pod 전체 Ready condition 이 False, READY 는 1/2 가 된다.
  containers:
    - name: ready-ok                 # readiness 통과 — 항상 200 응답할 파일 존재
      image: busybox
      command: ["sh", "-c", "touch /tmp/healthy; sleep 100000"]
      readinessProbe:
        exec:
          command: ["cat", "/tmp/healthy"]   # 파일 있으면 성공 → ready
        initialDelaySeconds: 2
        periodSeconds: 3
    - name: ready-fail               # readiness 실패 — 존재하지 않는 파일을 체크
      image: busybox
      command: ["sh", "-c", "sleep 100000"]
      readinessProbe:
        exec:
          command: ["cat", "/tmp/never-exists"]  # 파일 없음 → 항상 실패 → not-ready
        initialDelaySeconds: 2
        periodSeconds: 3
