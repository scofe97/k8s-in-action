# [실습 TODO] Secret을 환경변수로 주입하는 Pod (학습노트 08-03 §3)
#
# 목표: kubectl로 미리 만든 generic Secret(demo-secret)의 값을
#       이 컨테이너의 환경변수로 주입한다.
#
# 배경: 08-02에서 ConfigMap을 env로 주입할 때 valueFrom.configMapKeyRef를 썼다.
#       Secret은 문법이 평행하다 — configMapKeyRef 자리에 무엇이 오는가?(§3)
#
# ┌─ 채울 것 ────────────────────────────────────────────────┐
# │ 아래 TODO 두 줄을 채워라.                                  │
# │  (1) Secret에서 값을 가져오는 참조 키워드 (configMapKeyRef의 Secret판) │
# │  (2) 어느 Secret의 어느 key를 읽을지                       │
# └──────────────────────────────────────────────────────────┘
apiVersion: v1
kind: Pod
metadata:
  name: secret-env-demo
  namespace: secret-lab
spec:
  containers:
  - name: app
    image: busybox:1.36
    command: ["sh", "-c", "echo \"DB_PASSWORD=$DB_PASSWORD\"; sleep 3600"]  # 주입된 값을 logs로 관찰
    env:
    - name: DB_PASSWORD
      valueFrom:
        secretKeyRef:            # configMapKeyRef의 Secret판(§3)
          name: demo-secret
          key: pass
