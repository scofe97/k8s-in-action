apiVersion: v1
kind: Pod
metadata:
  name: configmap-required
  namespace: learning-configmap
spec:
  containers:
    - name: required
      image: alpine:3.20
      command: ["sleep", "3600"]
      envFrom:
        - configMapRef:
            name: does-not-exist
    - name: independent
      image: alpine:3.20
      command: ["sleep", "3600"]
  restartPolicy: Never
---
apiVersion: v1
kind: Pod
metadata:
  name: configmap-optional
  namespace: learning-configmap
spec:
  containers:
    - name: optional
      image: alpine:3.20
      command: ["sh", "-c"]
      args: ['printenv MISSING_VALUE; printf "printenv_exit=%s\n" "$?"; sleep 3600']
      env:
        - name: MISSING_VALUE
          valueFrom:
            configMapKeyRef:
              name: does-not-exist
              key: value
              optional: true
  restartPolicy: Never
