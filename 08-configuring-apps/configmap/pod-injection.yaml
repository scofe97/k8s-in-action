apiVersion: v1
kind: Pod
metadata:
  name: configmap-injection
  namespace: learning-configmap
spec:
  containers:
    - name: app
      image: alpine:3.20
      command: ["sh", "-c"]
      args:
        - |
          printf 'APP_MODE=%s LOG_LEVEL=%s SERVER_PORT=%s HTTP_PORT=%s\n' \
            "$APP_MODE" "$LOG_LEVEL" "$SERVER_PORT" "$HTTP_PORT"
          sleep 3600
      envFrom:
        - configMapRef:
            name: app-config
      env:
        - name: HTTP_PORT
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: SERVER_PORT
  restartPolicy: Never
