# =============================================================================
# 07-namespaces 실습 ② — Namespace를 매니페스트로 생성
#
# 학습 노트 §3 대응. namespace는 `kubectl create namespace` 한 줄로도 만들지만,
# Namespace 자신도 하나의 오브젝트이므로 YAML 매니페스트로도 만들 수 있다.
#
# 운영자(operator)는 이 방식을 쓴다 — 여러 namespace에 걸쳐 배포될 매니페스트
# 세트에 Namespace 오브젝트를 함께 넣어두면, "namespace 먼저 만들고 → 적용"의
# 두 단계를 한 번의 apply로 합칠 수 있기 때문이다(노트 §3).
#
# 주의(노트 §3 인용): namespace 이름은 RFC 1123 DNS 서브도메인 규칙을 따르되
# 점(.)은 쓸 수 없다. 소문자 영숫자와 하이픈만, 영숫자로 시작/끝.
# =============================================================================
apiVersion: v1
kind: Namespace
metadata:
  name: kiada-test2
